<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Floor Plans | TinyHomes CT</title>
  <meta name="description" content="Explore our stock floor plans for TinyHomes. Built by hand in Darien, Connecticut.">
  <meta property="og:image" content="/placeholder-og.jpg">
  <link rel="canonical" href="https://tinyhomesct.com/plans.html">
  <link rel="icon" href="/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,500;0,6..96,700;0,6..96,900;1,6..96,400;1,6..96,500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,700;0,9..144,900;1,9..144,300;1,9..144,400;1,9..144,500&family=Inter:wght@300;400;500;600&family=Caveat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    /* Modal styles for plan details */
    .plan-modal {
      position: fixed;
      inset: 0;
      background: rgba(14,29,58,0.85);
      z-index: 500;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .plan-modal.open {
      display: flex;
      opacity: 1;
    }
    .modal-content {
      background: var(--white);
      max-width: 900px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
      display: grid;
      grid-template-columns: 1fr 1fr;
    }
    @media (max-width: 768px) {
      .modal-content { grid-template-columns: 1fr; }
    }
    .modal-close {
      position: absolute;
      top: 16px; right: 24px;
      font-size: 32px;
      background: none; border: none;
      cursor: pointer; color: var(--ink);
      z-index: 10;
    }
    .modal-image {
      background: var(--paper);
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
      min-height: 300px;
    }
    .modal-details { padding: 48px; }
    .modal-details h2 { font-family: var(--display); font-size: 42px; margin-bottom: 8px; color: var(--olive-d); }
    .modal-spec { font-family: var(--body); font-size: 13px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--cognac); margin-bottom: 24px; }
    .modal-desc { font-size: 15px; line-height: 1.6; margin-bottom: 32px; opacity: 0.8; }
  </style>
</head>
<body>
  <div class="grain"></div>

  <header class="site-header scrolled" id="siteHeader">
    <div class="header-inner">
      <a href="/index.html" class="brand-name">
        <img src="/images/logo-full.png" alt="Tiny Homes Corporation">
      </a>
      <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
      <nav class="site-nav" id="siteNav">
        <a href="/index.html" class="nav-link">Home</a>
        <a href="/plans.html" class="nav-link">Plans</a>
        <a href="/gallery.html" class="nav-link">Gallery</a>
        <a href="/about.html" class="nav-link">About</a>
        <a href="/team.html" class="nav-link">Team</a>
        <a href="/contact.html" class="nav-link">Contact</a>
      </nav>
      <a href="/contact.html" class="brand-phone">
        <span class="brand-phone-number">(203) 555-0100</span>
        <img src="/images/logo.png" alt="TinyHomes">
      </a>
    </div>
  </header>

  <main style="padding-top: 100px;">
    <section class="section section-plans" id="plans" style="min-height: 80vh;">
      <div class="container">
        <p class="eyebrow">the lineup</p>
        <h1 class="display-h2">Our floor plans.<br><em>A few starting points.</em></h1>
        <p class="lead">These are our stock offerings. Any one can be customized in finish, materials, and proportion to match your home and enhance your property.</p>

        <div class="plan-grid" id="planGridPage">
          <!-- Populated by JS -->
        </div>
      </div>
    </section>

    <footer class="site-footer">
      <div class="container footer-inner">
        <div class="footer-left">
          <img src="/images/logo-full-white.png" alt="Tiny Homes Corporation" class="footer-logo">
          <p class="footer-meta">Darien, Connecticut &middot; © 2026</p>
        </div>
        <div class="footer-right">
          <a href="/privacy.html" class="footer-link">Privacy Policy</a>
        </div>
      </div>
    </footer>

    <button class="back-to-top" id="backToTop" aria-label="Back to top">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 19V5M5 12l7-7 7 7"/>
      </svg>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>

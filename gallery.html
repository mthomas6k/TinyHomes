<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery | TinyHomes CT</title>
  <meta name="description" content="View completed tiny home builds by TinyHomes CT.">
  <meta property="og:image" content="/placeholder-og.jpg">
  <link rel="canonical" href="https://tinyhomesct.com/gallery.html">
  <link rel="icon" href="/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,500;0,6..96,700;0,6..96,900;1,6..96,400;1,6..96,500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,700;0,9..144,900;1,9..144,300;1,9..144,400;1,9..144,500&family=Inter:wght@300;400;500;600&family=Caveat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <script src="js/data.js"></script>
  <style>
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 24px;
      margin-top: 60px;
    }
    .gallery-item {
      cursor: pointer;
      position: relative;
      overflow: hidden;
      aspect-ratio: 1;
    }
    .gallery-item .placeholder {
      width: 100%; height: 100%; border: none;
      background: rgba(14,29,58,0.04);
      transition: transform 0.4s var(--ease);
    }
    .gallery-item:hover .placeholder {
      transform: scale(1.03);
    }
    
    /* Lightbox */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(14,29,58,0.95);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.3s ease;
      padding: 40px;
    }
    .lightbox.open {
      display: flex;
      opacity: 1;
    }
    .lightbox-close {
      position: absolute;
      top: 24px; right: 32px;
      font-size: 40px;
      color: var(--white);
      background: none; border: none; cursor: pointer;
      line-height: 1; opacity: 0.7;
    }
    .lightbox-close:hover { opacity: 1; }
    .lightbox-content {
      max-width: 1200px;
      width: 100%;
      aspect-ratio: 16/9;
      background: var(--ink);
    }
  </style>
</head>
<body>
  <div class="grain"></div>

  <header class="site-header scrolled" id="siteHeader">
    <div class="header-inner">
      <a href="/index.html" class="brand-name">
        <img src="/images/logo-full.png" alt="Tiny Homes Corporation">
      </a>
      <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
      <a href="/contact.html" class="brand-phone">
        <span class="brand-phone-number">(203) 555-0100</span>
        <img src="/images/logo.png" alt="TinyHomes">
      </a>
    </div>
  </header>

  <!-- Mobile nav overlay (outside header to avoid backdrop-filter trap on iOS) -->
  <nav class="site-nav" id="siteNav">
        <a href="/index.html" class="nav-link">Home</a>
        <a href="/plans.html" class="nav-link">Plans</a>
        <a href="/gallery.html" class="nav-link">Gallery</a>
        <a href="/about.html" class="nav-link">About</a>
        <a href="/team.html" class="nav-link">Team</a>
        <a href="/contact.html" class="nav-link">Contact</a>
      </nav>

  <main style="padding-top: 100px;">
    <section class="section" style="background: var(--paper); min-height: 80vh;">
      <div class="container">
        <p class="eyebrow">completed builds</p>
        <h1 class="display-h2">The gallery.</h1>
        
        <div class="gallery-category" style="margin-top: 40px; margin-bottom: 24px;">
          <h2 class="display-h2" style="font-size: 40px;">Exteriors</h2>
        </div>
        <div class="gallery-grid" id="exteriorGrid"></div>

        <div class="gallery-category" style="margin-top: 80px; margin-bottom: 24px;">
          <h2 class="display-h2" style="font-size: 40px;">Floorplans</h2>
        </div>
        <div class="gallery-grid" id="floorplanGrid"></div>

        <div class="gallery-category" style="margin-top: 80px; margin-bottom: 24px;">
          <h2 class="display-h2" style="font-size: 40px;">Behind the Scenes</h2>
        </div>
        <div class="gallery-grid">
          <div class="gallery-item" onclick="openLightbox('Behind the Scenes', '/images/team/behind-scenes-1.jpg')">
            <img src="/images/team/behind-scenes-1.jpg" alt="Behind the Scenes" class="placeholder" style="object-fit: cover;">
          </div>
          <div class="gallery-item" onclick="openLightbox('Behind the Scenes', '/images/team/behind-scenes-2.jpg')">
            <img src="/images/team/behind-scenes-2.jpg" alt="Behind the Scenes" class="placeholder" style="object-fit: cover;">
          </div>
          <div class="gallery-item" onclick="openLightbox('Behind the Scenes', '/images/team/behind-scenes-3.jpg')">
            <img src="/images/team/behind-scenes-3.jpg" alt="Behind the Scenes" class="placeholder" style="object-fit: cover;">
          </div>
        </div>
      </div>
    </section>

    <footer class="site-footer">
      <div class="container footer-inner">
        <div class="footer-left">
          <img src="/images/logo-full-white.png" alt="Tiny Homes Corporation" class="footer-logo">
          <p class="footer-meta">Darien, Connecticut &middot; © 2026</p>
        </div>
        <div class="footer-right">
          <a href="/privacy.html" class="footer-link">Privacy Policy</a>
        </div>
      </div>
    </footer>

    <button class="back-to-top" id="backToTop" aria-label="Back to top">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 19V5M5 12l7-7 7 7"/>
      </svg>
    </button>
  </main>

  <div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
    <button class="lightbox-close">&times;</button>
    <div class="lightbox-content" id="lightboxContent" style="background: transparent; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%;">
      <img id="lightboxImage" src="" style="max-width: 100%; max-height: 80vh; object-fit: contain; border-radius: 4px;">
      <p id="lightboxCaption" style="color: white; margin-top: 16px; font-family: var(--body); letter-spacing: 0.1em; text-transform: uppercase; font-size: 14px;"></p>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    function openLightbox(caption, imgSrc) {
      const lb = document.getElementById('lightbox');
      document.getElementById('lightboxImage').src = imgSrc;
      document.getElementById('lightboxCaption').innerText = caption;
      lb.classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeLightbox(e) {
      if (e.target.id === 'lightbox' || e.target.classList.contains('lightbox-close')) {
        document.getElementById('lightbox').classList.remove('open');
        document.body.style.overflow = '';
      }
    }
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeLightbox({target: {id: 'lightbox'}});
    });

    document.addEventListener('DOMContentLoaded', () => {
      if (typeof PLANS !== 'undefined') {
        const floorplanGrid = document.getElementById('floorplanGrid');
        const exteriorGrid = document.getElementById('exteriorGrid');

        PLANS.forEach(plan => {
          // Add exteriors
          plan.images.forEach((imgSrc, i) => {
            const extItem = document.createElement('div');
            extItem.className = 'gallery-item';
            extItem.onclick = () => openLightbox(`${plan.name} - Exterior`, imgSrc);
            extItem.innerHTML = `<img src="${imgSrc}" alt="${plan.name} Exterior" class="placeholder" style="object-fit: cover;">`;
            exteriorGrid.appendChild(extItem);
          });

          // Add floorplans
          const fpItem = document.createElement('div');
          fpItem.className = 'gallery-item';
          fpItem.onclick = () => openLightbox(`${plan.name} - Floorplan`, plan.floorplan);
          fpItem.innerHTML = `<img src="${plan.floorplan}" alt="${plan.name} Floorplan" class="placeholder" style="object-fit: contain; padding: 20px; background: white;">`;
          floorplanGrid.appendChild(fpItem);

          if (plan.floorplan2) {
            const fpItem2 = document.createElement('div');
            fpItem2.className = 'gallery-item';
            fpItem2.onclick = () => openLightbox(`${plan.name} - Upper Floorplan`, plan.floorplan2);
            fpItem2.innerHTML = `<img src="${plan.floorplan2}" alt="${plan.name} Upper Floorplan" class="placeholder" style="object-fit: contain; padding: 20px; background: white;">`;
            floorplanGrid.appendChild(fpItem2);
          }
        });
      }
    });
  </script>
</body>
</html>

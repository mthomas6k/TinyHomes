<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Model Showcase | TinyHomes CT</title>
  <meta name="description" content="View the full gallery and details for our tiny home models. Built by hand in Darien, Connecticut.">
  <link rel="icon" href="/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,500;0,6..96,700;0,6..96,900;1,6..96,400;1,6..96,500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,700;0,9..144,900;1,9..144,300;1,9..144,400;1,9..144,500&family=Inter:wght@300;400;500;600&family=Caveat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .showcase-header {
      padding: 180px 0 80px;
      text-align: center;
      background: var(--paper);
    }
    .showcase-header h1 {
      font-family: var(--display);
      font-size: clamp(40px, 6vw, 72px);
      color: var(--olive-d);
      margin-bottom: 16px;
    }
    .showcase-spec {
      font-family: var(--body);
      font-size: 14px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--cognac);
    }
    .showcase-gallery {
      padding: 80px 0;
      background: var(--white);
    }
    .gallery-stack {
      display: flex;
      flex-direction: column;
      gap: 60px;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
    }
    .gallery-stack img {
      width: 100%;
      height: auto;
      border-radius: 8px;
      box-shadow: 0 10px 40px rgba(14,29,58,0.08);
    }
    .gallery-actions {
      text-align: center;
      padding: 80px 0 120px;
      background: var(--white);
    }
    .not-found {
      text-align: center;
      padding: 200px 24px;
    }
  </style>
</head>
<body>
  <div class="grain"></div>

  <header class="site-header scrolled" id="siteHeader">
    <div class="header-inner">
      <a href="/index.html" class="brand-name">
        <img src="/images/logo-full.png" alt="Tiny Homes Corporation">
      </a>
      <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
      <nav class="site-nav" id="siteNav">
        <a href="/index.html" class="nav-link">Home</a>
        <a href="/plans.html" class="nav-link">Plans</a>
        <a href="/gallery.html" class="nav-link">Gallery</a>
        <a href="/about.html" class="nav-link">About</a>
        <a href="/contact.html" class="nav-link">Contact</a>
      </nav>
      <a href="/contact.html" class="brand-logo desktop-only">
        <img src="/images/logo.png" alt="TinyHomes">
      </a>
    </div>
  </header>

  <main id="showcaseContainer">
    <div class="not-found">
      <h2>Loading...</h2>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <div class="footer-left">
        <img src="/images/logo-full-white.png" alt="Tiny Homes Corporation" class="footer-logo">
        <p class="footer-meta">Darien, Connecticut &middot; © 2026</p>
      </div>
      <div class="footer-right">
        <a href="/privacy.html" class="footer-link">Privacy Policy</a>
      </div>
    </div>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      const slug = urlParams.get('id');
      const container = document.getElementById('showcaseContainer');
      
      if (!slug || typeof PLANS === 'undefined') {
        container.innerHTML = '<div class="not-found"><h2>Model not found</h2><a href="/plans.html" class="btn btn-primary">View All Plans</a></div>';
        return;
      }
      
      const plan = PLANS.find(p => p.slug === slug);
      if (!plan) {
        container.innerHTML = '<div class="not-found"><h2>Model not found</h2><a href="/plans.html" class="btn btn-primary">View All Plans</a></div>';
        return;
      }
      
      document.title = `${plan.name} | TinyHomes CT`;
      
      let galleryHtml = '';
      if (plan.images && plan.images.length > 0) {
        galleryHtml = plan.images.map(img => `<img src="${img}" alt="${plan.name} Render">`).join('');
      } else {
        galleryHtml = `<img src="${plan.image}" alt="${plan.name} Render">`;
      }
      
      if (plan.floorplan) {
        galleryHtml += `<img src="${plan.floorplan}" alt="${plan.name} Floorplan">`;
      }
      
      container.innerHTML = `
        <section class="showcase-header">
          <div class="container">
            <h1>${plan.name}</h1>
            <p class="showcase-spec">${plan.specText}</p>
          </div>
        </section>
        <section class="showcase-gallery">
          <div class="gallery-stack">
            ${galleryHtml}
          </div>
        </section>
        <section class="gallery-actions">
          <a href="/contact.html" class="btn btn-primary">Request This Plan</a>
          <a href="/plans.html" class="btn btn-ghost" style="margin-left: 16px;">Back to Plans</a>
        </section>
      `;
    });
  </script>
</body>
</html>
